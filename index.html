<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfFlow - Acceso Administrativo</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-card">
        <h2>🏄‍♂️ SurfFlow</h2>
        <p>Ingresa tus credenciales para gestionar el inventario de Barranco.</p>

        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="txt-usuario" placeholder="Ej: natali_surf">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="txt-password" placeholder="••••••••">
        </div>

        <button class="btn-login" onclick="intentarLogin()">Entrar al Sistema</button>

        <div id="mensaje-error">⚠️ Usuario o contraseña incorrectos.</div>
    </div>

    <script src="login.js"></script>
</body>

</html>
